name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download SMAPI references
        run: |
          # SMAPI NuGet paketinden referans DLL'lerini çek
          mkdir -p /tmp/stardew/smapi-internal
          dotnet restore
          # ModBuildConfig NuGet cache'inden SMAPI DLL'lerini bul ve kopyala
          SMAPI_DLL=$(find ~/.nuget -name "StardewModdingAPI.dll" 2>/dev/null | head -1)
          if [ -n "$SMAPI_DLL" ]; then
            cp "$SMAPI_DLL" /tmp/stardew/
            echo "Found SMAPI: $SMAPI_DLL"
          fi
          # Stardew Valley stub DLL'leri (ModBuildConfig validation için)
          for dll in "Stardew Valley.dll" "StardewValley.GameData.dll" "MonoGame.Framework.dll" "xTile.dll" "BmFont.dll"; do
            # Boş ama geçerli bir .NET assembly oluştur
            echo "" > "/tmp/stardew/$dll"
          done
          # SMAPI stub
          [ ! -f "/tmp/stardew/StardewModdingAPI.dll" ] && echo "" > "/tmp/stardew/StardewModdingAPI.dll"
          ls /tmp/stardew/

      - name: Build
        run: |
          dotnet build --configuration Release \
            /p:GamePath="/tmp/stardew" \
            /p:EnableModDeploy=false \
            /p:EnableModZip=false \
            /p:NoWarn=NU1701

      - name: Create mod zip
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          OUTDIR="bin/Release/net6.0"
          ZIPNAME="SeasonPlanner ${VERSION}.zip"

          mkdir -p /tmp/mod_package/SeasonPlanner
          cp "$OUTDIR/SeasonPlanner.dll" /tmp/mod_package/SeasonPlanner/
          cp manifest.json /tmp/mod_package/SeasonPlanner/
          cp -r i18n /tmp/mod_package/SeasonPlanner/

          cd /tmp/mod_package
          zip -r "/tmp/$ZIPNAME" SeasonPlanner/
          echo "ZIP_PATH=/tmp/$ZIPNAME" >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIPNAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: "Release v${{ steps.version.outputs.VERSION }}"
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Nexus Mods
        run: |
          curl -X POST \
            "https://api.nexusmods.com/v1/games/stardewvalley/mods/${{ secrets.NEXUS_MOD_ID }}/files.json" \
            -H "apikey: ${{ secrets.NEXUS_API_KEY }}" \
            -F "category=MAIN" \
            -F "version=${{ steps.version.outputs.VERSION }}" \
            -F "name=Season Planner and Bundle Reminder" \
            -F "file=@${{ env.ZIP_PATH }};type=application/zip"
