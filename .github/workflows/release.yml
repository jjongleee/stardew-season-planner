name: Release

# Bu workflow sadece GitHub Release oluşturur.
# Zip dosyası yerel makinede build edilip tag ile birlikte push'lanmalıdır.
# Nexus'a yükleme manuel yapılır.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Check for zip in repo
        id: zip
        run: |
          ZIP=$(find . -name "SeasonPlanner*.zip" -not -path "./.git/*" | head -1)
          echo "ZIP_PATH=$ZIP" >> $GITHUB_OUTPUT
          echo "Found zip: $ZIP"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Season Planner and Bundle Reminder v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Changes
            See [README](https://github.com/devjawen/stardew-season-planner#readme) for full feature list.

            ## Installation
            1. Install [SMAPI](https://smapi.io)
            2. Extract `SeasonPlanner` folder into your `Mods/` directory
            3. Launch Stardew Valley through SMAPI
          files: ${{ steps.zip.outputs.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
