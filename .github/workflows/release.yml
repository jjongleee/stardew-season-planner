name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Create release zip
        shell: pwsh
        run: |
          # The mod build config packages the mod into a zip in the output folder.
          # Adjust the output folder if your project uses a different target framework.
          $out = "${{ github.workspace }}\bin\Release\net6.0"
          $tag = '${{ github.ref_name }}'
          $zip = "SeasonPlanner-$tag.zip"
          if (Test-Path $out) {
            Compress-Archive -Path "$out\*" -DestinationPath $zip -Force
            Write-Host "Created $zip"
          } else {
            Write-Error "Output folder not found: $out"
          }

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref }}
          name: ${{ github.ref }}
          body: |
            Automated release for tag ${{ github.ref }}.
          files: "SeasonPlanner-*.zip"
