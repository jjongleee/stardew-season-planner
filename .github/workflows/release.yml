name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Season Planner and Bundle Reminder v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Season Planner and Bundle Reminder v${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Install [SMAPI 4.1+](https://smapi.io)
            2. Download the zip below and extract `SeasonPlanner` into your `Mods/` folder
            3. Launch Stardew Valley through SMAPI

            ### Requirements
            - Stardew Valley 1.6+
            - SMAPI 4.1+
            - [Generic Mod Config Menu](https://www.nexusmods.com/stardewvalley/mods/5098) (optional)

            ### Full feature list
            See the [README](https://github.com/devjawen/stardew-season-planner#readme).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
